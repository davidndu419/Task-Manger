[build]
  # We stay at the root so pnpm can see the /lib folder
  command = "pnpm install && pnpm --filter @workspace/api-zod run build && pnpm --filter @workspace/api-server run build"
  publish = "artifacts/api-server/dist"

[functions]
  directory = "artifacts/api-server/dist"
  node_bundle = {}

[[redirects]]
  from = "/*"
  to = "/index"
  status = 200