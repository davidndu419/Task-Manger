[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter ./lib/api-zod run build && pnpm --filter ./artifacts/api-server run build"
  publish = "artifacts/api-server/dist"

[functions]
  directory = "artifacts/api-server/dist"
  external_node_modules = ["express", "pino", "pino-http", "cors", "serverless-http"]

[functions.node_bundle]
  # This empty section satisfies the "must be an object" rule 
  # and triggers the esbuild bundler we need.