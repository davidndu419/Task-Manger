[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter ./lib/api-zod run build && pnpm --filter ./artifacts/api-server run build"
  publish = "artifacts/api-server/dist"

[functions]
  directory = "artifacts/api-server/dist"
  # This makes Netlify bundle EVERYTHING into server.js
  node_bundle = true 

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true